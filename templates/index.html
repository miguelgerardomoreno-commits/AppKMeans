<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Clasificación de clientes</title>
    <style>
      body { font-family: Arial, sans-serif; max-width: 680px; margin: 40px auto; padding: 0 16px; }
      label { display:block; margin-top:8px; }
      input { padding:6px; width:200px; }
      .result { margin-top:16px; padding:10px; border:1px solid #ddd; background:#f9f9f9 }
      .error { color: #a00 }
    </style>
  </head>
  <body>
    <h1>Clasificación de clientes</h1>
    <p>Introduce los datos de ingresos y gastos para ver el grupo asignado.</p>

    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/predict">
      <label>Ingresos:
        <input name="ingresos" type="text" value="{{ ingresos or '' }}" placeholder="ej. 3500" />
      </label>
      <label>Gastos:
        <input name="gastos" type="text" value="{{ gastos or '' }}" placeholder="ej. 1200" />
      </label>
      <div style="margin-top:10px">
        <button type="submit">Clasificar</button>
      </div>
    </form>

    {% if group %}
      <div class="result">
        <strong>Resultado:</strong>
        <p>Ingresos: {{ ingresos }} — Gastos: {{ gastos }}</p>
        <p><strong>Grupo asignado:</strong> {{ group }}</p>
      </div>
    {% endif %}

    
  </body>
</html>
